<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Mawzoon</title>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        
        .auth-card {
            width: 100%;
            max-width: 460px;
            padding: 38px;
        }
        
        .auth-card h1 {
            font-size: 2.3rem;
            margin: 14px 0;
        }
        
        .auth-card p {
            margin-bottom: 26px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #fff;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: #fff;
            outline: none;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus {
            border-color: var(--yellow);
        }
        
        .auth-bottom {
            text-align: center;
            margin-top: 20px;
        }
        
        .auth-bottom a {
            color: var(--yellow);
            font-weight: 700;
            transition: opacity 0.3s ease;
        }
        
        .auth-bottom a:hover {
            opacity: 0.8;
        }

        /* Smooth animation for the error box */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #error-box {
            animation: slideDown 0.3s ease-out;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">Mawzoon</div>
        <div class="nav-actions">
            <a href="/" class="btn btn-outline small-btn">Home</a>
        </div>
    </nav>

    <section class="auth-page">
        <div class="card glow-card auth-card">
            <span class="badge">Welcome Back</span>
            <h1>Sign In</h1>
            <p>Access your dashboard, watchlists, and AI insights.</p>
            
            <div id="error-box" style="display: none; background: rgba(255, 106, 106, 0.1); border: 1px solid #ff6a6a; color: #ff6a6a; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-weight: 700; font-size: 0.95rem;">
                Incorrect email or password. Please try again.
            </div>
            
            <form action="/login" method="POST">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn full-btn">Sign In</button>
            </form>
            
            <div class="auth-bottom">
                Don't have an account?
                <a href="/signup">Create one</a>
            </div>
        </div>
    </section>

    <script>
        // 1. Look at the web address
        const urlParams = new URLSearchParams(window.location.search);
        
        // 2. If the address has ?error=true, show the red box!
        if (urlParams.get('error') === 'true') {
            document.getElementById('error-box').style.display = 'block';
            
            // 3. Silently clean up the web address so the error doesn't get stuck if they refresh
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
</body>
</html>
