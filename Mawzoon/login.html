<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | Mawzoon</title>
<link rel="stylesheet" href="css/style.css">
<style>
.auth-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}
.auth-card{
    width:100%;
    max-width:460px;
    padding:38px;
}
.auth-card h1{
    font-size:2.3rem;
    margin:14px 0;
}
.auth-card p{
    margin-bottom:26px;
}
.form-group{
    margin-bottom:18px;
}
.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:700;
    color:#fff;
}
.form-group input{
    width:100%;
    padding:14px 16px;
    border-radius:14px;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:#fff;
    outline:none;
}
.form-group input:focus{
    border-color:var(--yellow);
}
.auth-bottom{
    text-align:center;
    margin-top:20px;
}
.auth-bottom a{
    color:var(--yellow);
    font-weight:700;
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">Mawzoon</div>
    <div class="nav-actions">
        <a href="/" class="btn btn-outline small-btn">Home</a>
    </div>
</nav>

<section class="auth-page">
    <div class="card glow-card auth-card">
        <span class="badge">Welcome Back</span>
        <h1>Sign In</h1>
        <p>Access your dashboard, watchlists, and AI insights.</p>

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn full-btn">Sign In</button>
        </form>

        <div class="auth-bottom">
            Don't have an account?
            <a href="/signup">Create one</a>
        </div>
    </div>
</section>

</body>
</html>
