<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | Mawzoon Advisor</title>
<link rel="stylesheet" href="css/style.css">
<style>
.auth-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}
.auth-card{
    width:100%;
    max-width:460px;
    padding:38px;
}
.auth-card h1{
    font-size:2.3rem;
    margin:14px 0;
}
.auth-card p{
    margin-bottom:26px;
}
.form-group{
    margin-bottom:18px;
}
.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:700;
    color:#fff;
}
.form-group input{
    width:100%;
    padding:14px 16px;
    border-radius:14px;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:#fff;
    outline:none;
}
.form-group input:focus{
    border-color:var(--yellow);
}
.auth-bottom{
    text-align:center;
    margin-top:20px;
}
.auth-bottom a{
    color:var(--yellow);
    font-weight:700;
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">Mawzoon</div>
    <div class="nav-actions">
      <a href="index.html" class="btn">Get Started</a>
      <button class="menu-toggle" id="menuToggle">☰</button>
    </div>
</nav>

<section class="auth-page">
    <div class="card glow-card auth-card">
        <span class="badge">Join Mawzoon</span>
        <h1>Create Account</h1>
        <p>Build your portfolio and unlock AI-powered finance tools.</p>

        <form action="/signup" method="POST">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn full-btn">Create Account</button>
        </form>

        <div class="auth-bottom">
            Already have an account?
            <a href="/login">Sign In</a>
        </div>
    </div>
</section>

</body>
</html>
